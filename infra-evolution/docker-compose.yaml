version: '3.8'

# Evolution API + Supabase (Postgres gerenciado) + Redis local
# Banco de dados: Supabase (nao sobe Postgres local)
# Preencha os valores marcados com <...> ou use o arquivo .env

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # ========== CONFIGURACOES GERAIS ==========
      SERVER_PORT: 8080
      SERVER_URL: ${SERVER_URL}                       # ex: https://api.suaempresa.com.br

      # ========== AUTENTICACAO DA API ==========
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY} # senha forte da API

      # ========== BANCO DE DADOS (SUPABASE) ==========
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      # Connection string do Supabase (Project Settings -> Database -> Connection string):
      # postgresql://postgres:<SENHA>@db.<REF>.supabase.co:5432/postgres
      DATABASE_CONNECTION_URI: ${DATABASE_CONNECTION_URI}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # ========== REDIS (Cache local) ==========
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"

      # ========== LOGS ==========
      LOG_LEVEL: ERROR
    depends_on:
      - redis
    volumes:
      - evolution_instances:/evolution/instances

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  evolution_instances:
  redis_data:
